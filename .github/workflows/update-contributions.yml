name: 更新 GitHub 贡献数据

on:
  schedule:
    # 每天 UTC 时间 0 点执行（北京时间 8 点）
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:
  # 当代码推送到 main 分支时也触发
  push:
    branches:
      - main
      - master

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 给予写入仓库的权限
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: |
          # 不需要额外依赖，使用原生 fetch
          echo "无需安装额外依赖"
      
      - name: 获取贡献数据
        env:
          # GitHub 自动提供的 Token，具有写入权限
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node fetch-contributions.js
      
      - name: 提交并推送更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add contributions-data.json
          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "没有检测到数据变化"
          else
            git commit -m "🔄 自动更新贡献数据 [skip ci]"
            git push
            echo "✅ 数据已更新并推送"
          fi
